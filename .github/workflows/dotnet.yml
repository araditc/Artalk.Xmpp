name: .NET

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-test-pack:
    name: Build, test, and pack
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\Artalk.XmppSoloution.sln

      - name: Build
        run: dotnet build .\Artalk.XmppSoloution.sln -c $env:Configuration --no-restore

      - name: Test
        run: dotnet test .\Artalk.XmppSoloution.sln -c $env:Configuration --no-build --logger trx

      - name: Pack
        run: dotnet pack .\Artalk.Xmpp\Artalk.Xmpp.csproj -c $env:Configuration --no-build -o .\artifacts\ci-pack
